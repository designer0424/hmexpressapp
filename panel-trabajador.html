<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HM Express — Mis servicios</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="topbar">
  <div class="brand-mini">
    <div class="icon-badge" id="topbar-icon"></div>
    <div class="brand">HM <span>EXPRESS</span></div>
  </div>
  <div class="user-block">
    <div>
      <div class="user-name" id="topbar-user-name"></div>
      <div class="user-role" id="topbar-user-role"></div>
    </div>
    <button class="btn-logout" id="topbar-logout"><span id="logout-icon"></span> Salir</button>
  </div>
</div>

<div class="content">
  <div class="card">
    <h2>Servicios de hoy</h2>
    <p class="subtitle">Aquí aparecen los servicios que te asignó el administrador para hoy.</p>

    <div class="grid-stats">
      <div class="stat-pill">
        <div class="pill-head"><span data-icon="package"></span> Total hoy</div>
        <div class="pill-value" id="stat-total">0</div>
      </div>
      <div class="stat-pill">
        <div class="pill-head"><span data-icon="clock"></span> Por hacer</div>
        <div class="pill-value" id="stat-pendientes">0</div>
      </div>
      <div class="stat-pill highlight">
        <div class="pill-head"><span data-icon="check"></span> Terminados</div>
        <div class="pill-value" id="stat-terminados">0</div>
      </div>
    </div>

    <div id="lista-servicios"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-detalle">
  <div class="modal-card">
    <button class="modal-close" id="modal-cerrar"><span id="modal-close-icon"></span></button>
    <div id="modal-contenido"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script src="notificaciones.js"></script>
<script src="trabajador-panel.js"></script>
<script>
  document.querySelectorAll("[data-icon]").forEach((el) => {
    el.innerHTML = icon(el.getAttribute("data-icon"), 15, el.getAttribute("data-color") || "currentColor");
  });
  document.getElementById("topbar-icon").innerHTML = icon("bike", 18, "#fff");
  document.getElementById("logout-icon").outerHTML = icon("logout", 15);
  document.getElementById("modal-close-icon").outerHTML = icon("x", 16);
  document.getElementById("modal-cerrar").addEventListener("click", cerrarDetalle);
  document.getElementById("modal-detalle").addEventListener("click", (e) => {
    if (e.target.id === "modal-detalle") cerrarDetalle();
  });
</script>
</body>
</html>
