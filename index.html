<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HM Express — Iniciar sesión</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-badge" id="login-icon"></div>
      <div class="brand">HM <span>EXPRESS</span></div>
      <div class="subtitle">SISTEMA DE DOMICILIOS</div>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="login-username">Usuario</label>
        <input class="input" id="login-username" type="text" placeholder="tu.usuario" autocomplete="username" />
      </div>
      <div class="field">
        <label for="login-password">Contraseña</label>
        <input class="input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="login-error" class="error-text"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Iniciar sesión</button>
    </form>

    <div style="margin-top:18px;font-size:12px;color:var(--gray);text-align:center;line-height:1.5">
      Acceso exclusivo para el equipo HM Express.<br />Solicita tu usuario al administrador.
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById("login-icon").innerHTML = icon("bike", 28, "#2F6FD6");
  initLoginForm();
</script>
</body>
</html>
